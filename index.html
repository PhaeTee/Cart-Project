<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Phaetee Desserts</title>
    <link rel="stylesheet" href="cart.css" />
    <link
      rel="shortcut icon"
      href="assets/images/favicon-32x32.png"
      type="image/x-icon"
    />
  </head>

  <body>
    <div class="container">
      <header>
        <div class="title">
          <h1>Desserts</h1>
        </div>

        <!-- <div class="icon-cart">
                <img src="assets/images/icon-add-to-cart.svg" alt="cart icon">
                <span>8</span>
            </div> -->
      </header>

      <div id="product-list"></div>
    </div>

    <div class="cart-tab">
      <h2>Your Cart <span id="cart-count">(0)</span></h2>

      <div id="cart-div">
        <!-- <img src="assets/images/illustration-empty-cart.svg" alt="">
                <p>Your added items will appear here</p> -->
      </div>

      <!-- <div class="btn">

                <button id="close">Close</button>
                <button id="checkOut">Check Out</button>
            </div> -->
    </div>

    <!-- Include this script tag or install `@tailwindplus/elements` via npm: -->
    <!-- <script src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@1" type="module"></script> -->

    <el-dialog>
      <dialog
        class="review-modal"
        id="dialog"
        aria-labelledby="dialog-title"
        class="fixed inset-0 size-auto max-h-none max-w-none overflow-y-auto bg-transparent backdrop:bg-transparent"
      >
        <el-dialog-backdrop
          class="fixed inset-0 bg-gray-900/50 transition-opacity data-closed:opacity-0 data-enter:duration-300 data-enter:ease-out data-leave:duration-200 data-leave:ease-in"
        ></el-dialog-backdrop>

        <div
          tabindex="0"
          class="flex min-h-full items-end justify-center p-4 text-center focus:outline-none sm:items-center sm:p-0"
        >
          <el-dialog-panel
            class="relative transform overflow-hidden rounded-lg bg-gray-800 text-left shadow-xl outline -outline-offset-1 outline-white/10 transition-all data-closed:translate-y-4 data-closed:opacity-0 data-enter:duration-300 data-enter:ease-out data-leave:duration-200 data-leave:ease-in sm:my-8 sm:w-full sm:max-w-lg data-closed:sm:translate-y-0 data-closed:sm:scale-95"
          >
            <div class="bg-gray-800 px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
              <div class="sm:flex sm:items-start">
                <div
                  class="mx-auto flex size-12 shrink-0 items-center justify-center rounded-full bg-red-500/10 sm:mx-0 sm:size-10"
                >
                  <img src="assets/images/icon-order-confirmed.svg" alt="" />
                  <!-- <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" data-slot="icon" aria-hidden="true" class="size-6 text-red-400">
                <path d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z" stroke-linecap="round" stroke-linejoin="round" />
              </svg> -->
                </div>
                <div class="mt-3 text-center sm:mt-0 sm:ml-4 sm:text-left">
                  <h3
                    id="dialog-title"
                    class="text-base font-semibold text-white"
                  >
                    Order Confirmed
                  </h3>
                  <div class="mt-2">
                    <p class="text-sm text-gray-400">
                      We hope you enjoy your meal!
                    </p>
                  </div>
                </div>
              </div>
            </div>

            <div class="order-review"></div>
            <div
              class="bg-gray-700/25 px-4 py-3 sm:flex sm:flex-row-reverse sm:px-6"
            >
              <!-- <button type="button" command="close" commandfor="dialog" class="inline-flex w-full justify-center rounded-md bg-red-500 px-3 py-2 text-sm font-semibold text-white hover:bg-red-400 sm:ml-3 sm:w-auto">Deactivate</button> -->
              <button
                id="new-order"
                type="button"
                onclick="newOrder()"
                command="close"
                commandfor="dialog"
                class="mt-3 inline-flex w-full justify-center rounded-md bg-white/10 px-3 py-2 text-sm font-semibold text-white inset-ring inset-ring-white/5 hover:bg-white/20 sm:mt-0 sm:w-auto"
              >
                Start new order
              </button>
            </div>
          </el-dialog-panel>
        </div>
      </dialog>
    </el-dialog>

    <script
      src="cart.js"
      src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@1"
    ></script>
  </body>
</html>
